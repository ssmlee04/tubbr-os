version: '3.8'

services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tubbr
      POSTGRES_PASSWORD: tubbr
      POSTGRES_DB: tubbr
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tubbr"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: