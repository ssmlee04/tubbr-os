version: '3.8'

services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tubbr
      POSTGRES_PASSWORD: tubbr  # pragma: allowlist secret
      POSTGRES_DB: tubbr
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tubbr"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth:
    build:
      context: ./packages/auth
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: tubbr
      POSTGRES_PASSWORD: tubbr # pragma: allowlist secret
      POSTGRES_DB: tubbr
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    command: sh -c "node src/migrate.js && node src/index.js"

  web:
    image: node:22-alpine
    ports:
      - "3001:3001"
    volumes:
      - ./packages/web/src:/app/src
      - ./packages/web/public:/app/public
      - ./packages/web/next.config.ts:/app/next.config.ts
      - ./packages/web/next-env.d.ts:/app/next-env.d.ts
      - ./packages/web/tsconfig.json:/app/tsconfig.json
      - ./packages/web/package.json:/app/package.json
      - ./packages/web/package-lock.json:/app/package-lock.json
      - web_node_modules:/app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://auth:3000
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    user: root
    depends_on:
      - auth

  backend:
    image: elixir:1.15
    ports:
      - "4000:4000"
    volumes:
      - ./packages/backend:/app
      - backend_deps:/app/deps
      - backend_build:/app/_build
    environment:
      PORT: 4000
      MIX_ENV: dev
      DATABASE_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    command: sh -c "mix deps.get && mix phx.server"
    user: root

volumes:
  postgres_data:
  backend_deps:
  backend_build:
  web_node_modules: